name: task-driven
version: 1
description: Minimal single-file workflow for DCAnt 2.0

artifacts:
  - id: change
    generates: change.md
    description: Requirements and implementation checklist
    template: change.md
    instruction: |
      Создай один краткий документ изменения на русском языке.

      Документ должен содержать:

      1. Зачем требуется изменение.
      2. Какое наблюдаемое поведение должно быть реализовано.
      3. Что явно не входит в задачу.
      4. Какие работы и тесты необходимо выполнить.
      5. Как будет проверен результат.

      Пиши кратко и конкретно.
      Не создавай proposal.md, specs.md, design.md или tasks.md.
      Не расширяй задачу за пределы запроса пользователя.
      Не добавляй архитектурные элементы на будущее.
      Не создавай новые проекты, интерфейсы или зависимости без
      доказанной необходимости.

    requires: []

apply:
  requires:
    - change
  tracks: change.md
  instruction: |
    Выполни только задачи из раздела "Задачи".

    Не расширяй scope.
    После реализации запусти сборку и тесты.
    Отмечай задачу выполненной только после фактического завершения.
    Заполни раздел "Результат проверки".