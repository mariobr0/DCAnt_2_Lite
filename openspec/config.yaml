schema: task-driven

context: |
  # DCAnt 2.0

  DCAnt 2.0 является локальной DCA-стратегией для Quantower,
  написанной на C# и .NET 10.

  Проект должен оставаться простым и соответствовать масштабу
  одного локального торгового плагина.

  ## Структура

  - DCAnt2.Core содержит торговую логику, EngineLoop и интерфейсы.
  - DCAnt2.Infrastructure содержит SQLite и техническое хранение.
  - DCAnt2.Quantower содержит интеграцию с Quantower.
  - DCAnt2.Plugin запускает и останавливает стратегию.
  - DCAnt2.Tests содержит основные автоматические тесты.
  - DCAnt2.QuantowerTests содержит проверки поведения Quantower API.

  ## Обязательные правила

  - Только EngineLoop изменяет торговое состояние.
  - Бот управляет только доказанно принадлежащими ему ордерами.
  - Account и Symbol сами по себе не доказывают принадлежность ордера.
  - Тайм-аут не доказывает отказ торговой операции.
  - Запрещены слепые повторы торговых команд.
  - Торговое намерение сохраняется в Outbox до отправки в Quantower.
  - Позиция, VWAP и PnL рассчитываются по Executions.
  - Повторный Execution не учитывается дважды.
  - Неоднозначное состояние запрещает увеличение позиции.
  - Quantower callbacks не изменяют торговое состояние напрямую.
  - Domain-логика не зависит от Quantower, SQLite, UI и файловой системы.

  ## Ограничения сложности

  Не добавляй без текущей доказанной необходимости:

  - новые проекты solution;
  - новые архитектурные слои;
  - Generic Repository;
  - общий Unit of Work;
  - persistent Inbox;
  - generic StateSnapshots;
  - Event Sourcing;
  - отдельный Common project;
  - новые библиотеки;
  - новые архитектурные документы.

  Предпочитай минимальное решение, которое полностью сохраняет
  безопасность торгового поведения.

rules:
  change:
    - Пиши кратко и простым русским языком.
    - Рекомендуемый размер change.md составляет от 30 до 100 строк.
    - Всегда объясняй практическую причину изменения.
    - Всегда описывай проверяемое поведение.
    - Всегда указывай, что не входит в задачу.
    - Не расширяй scope без согласования.
    - Не добавляй необязательные задачи.
    - Для ордеров учитывай duplicate, timeout, partial fill и restart.
    - Для изменения Quantower API помечай неподтвержденное поведение как Contract Test Requirement.
    - Не начинай реализацию до просмотра change.md пользователем.